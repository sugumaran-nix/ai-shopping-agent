services:
  - type: web
    name: ai-shopping-agent-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend   # <--- CRITICAL: Tells Docker to only use the backend folder
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: SCRAPER_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: RATE_LIMIT_PER_MINUTE
        value: "10"
      - key: CACHE_TTL_SECONDS
        value: "600"
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
