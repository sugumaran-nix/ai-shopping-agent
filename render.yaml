services:
  - type: web
    name: ai-shopping-agent-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: SCRAPER_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: RATE_LIMIT_PER_MINUTE
        value: "10"
      - key: CACHE_TTL_SECONDS
        value: "600"
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
